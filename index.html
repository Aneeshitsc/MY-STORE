<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLINE STORE</title>
    <style>
        * {
            margin: 0px;
        }
        .page {
            background-color: whitesmoke;
        }
        .header {
            display: flex;
            justify-content: space-between;
            background-color: orange;
            align-items: center;
        }
        li {
            display:inline-block;
            padding: 10px;
        }
        a{
            text-decoration: none;
        }
        a:hover{
            text-decoration: underline;
        }
        .box {
            background-color: orange;
            padding: 10px;
            margin: 20px;
        }
        .row1{
            display: flex;
            justify-content: center;
        }
        .ali{
            text-align: center;
        }
        
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div><h1>MY STORE</h1></div>
            <div>
                <ul>
                    <li><a href="#">HOME</a></li>
                    <li><a href="#">SERVICES</a></li>
                    <li><a href="#">ABOUT</a></li>
                    <li><a href="#">CONTACT</a></li>
                </ul>
            </div>
        </div>
        <div class="row1">
            <div class="box">
                <img src="images/1.png"/>
                <h3 class="ali">PRODUCT 1</h3>
                <h5 class="ali"> PRICE : $25 </h5>
                <button>Add To Cart</button>
            </div>
            <div class="box">
                <img src="images/2.png"/>
                <h3 class="ali">PRODUCT 2</h3>
                <h5 class="ali"> PRICE : $30 </h5>
                <button>Add To Cart</button>
            </div>
            <div class="box">
                <img src="images/3.png"/>
                <h3 class="ali">PRODUCT 3</h3>
                <h5 class="ali"> PRICE : $27 </h5>
                <button>Add To Cart</button>
            </div>
        </div>
        <div>
            
        </div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
